<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Schema Renderer Tests</title>
</head>
<body>
  <h1>Schema Renderer Test Harness</h1>
  <div id="root"></div>
  <pre id="results"></pre>
  <script type="module">
    import { renderSchema } from "/dist/js/schema_renderer.js";
    import { renderSchemaEditor } from "/dist/js/schema_editor.js";

    const results = [];

    function assert(cond, name, extra) {
      results.push({ pass: !!cond, name, extra: extra || null });
    }

    function runCase(name, fn) {
      try {
        fn();
      } catch (err) {
        const stack = (err.stack || "").split("\n").slice(0, 8).join(" | ");
        results.push({ pass: false, name, error: err.message + " :: " + stack });
      }
    }

    runCase("string", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "string", title: "Name" }, root);
      el.querySelector("input").value = "alice";
      assert(getValue() === "alice", "string input roundtrip");
    });

    runCase("integer with min/max", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "integer", minimum: 0, maximum: 10 }, root);
      el.querySelector("input").value = "5";
      assert(getValue() === 5, "integer parse");
    });

    runCase("boolean", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "boolean" }, root);
      el.querySelector("input").checked = true;
      assert(getValue() === true, "boolean true");
      el.querySelector("input").checked = false;
      assert(getValue() === false, "boolean false");
    });

    runCase("enum", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "string", enum: ["a", "b", "c"] }, root);
      el.querySelector("select").value = "b";
      assert(getValue() === "b", "enum select");
    });

    runCase("object with required", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const schema = {
        type: "object",
        required: ["name"],
        properties: {
          name: { type: "string", title: "Name" },
          age: { type: "integer" },
        },
      };
      const { el, getValue } = renderSchema(schema, root);
      const inputs = el.querySelectorAll("input");
      inputs[0].value = "bob";
      inputs[1].value = "30";
      const v = getValue();
      assert(v.name === "bob" && v.age === 30, "object roundtrip", v);
    });

    runCase("json widget", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "string", ui_hint: { widget: "json" } }, root);
      el.querySelector("textarea").value = '{"x": 1, "y": [2,3]}';
      const v = getValue();
      assert(v && v.x === 1 && Array.isArray(v.y) && v.y.length === 2, "json widget parse", v);
    });

    runCase("array of strings", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getValue } = renderSchema({ type: "array", items: { type: "string" } }, root);
      const addBtn = el.querySelector("button");
      addBtn.click();
      addBtn.click();
      addBtn.click();
      const inputs = el.querySelectorAll("input");
      inputs[0].value = "a";
      inputs[1].value = "b";
      inputs[2].value = "c";
      const v = getValue();
      assert(Array.isArray(v) && v.length === 3 && v[0] === "a", "array of strings", v);
    });

    runCase("nested object in array", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const schema = {
        type: "array",
        items: {
          type: "object",
          required: ["name"],
          properties: {
            name: { type: "string" },
            value: { type: "integer" },
          },
        },
      };
      const { el, getValue } = renderSchema(schema, root);
      el.querySelector("button").click();
      el.querySelector("button").click();
      const items = el.querySelectorAll(".schema-array-item");
      const inputs0 = items[0].querySelectorAll("input");
      inputs0[0].value = "first";
      inputs0[1].value = "42";
      const inputs1 = items[1].querySelectorAll("input");
      inputs1[0].value = "second";
      const v = getValue();
      assert(v.length === 2 && v[0].name === "first" && v[0].value === 42, "nested object in array", v);
    });

    runCase("oneOf selection", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const schema = {
        oneOf: [
          { type: "object", title: "Person", properties: { name: { type: "string" } } },
          { type: "object", title: "Robot", properties: { id: { type: "integer" } } },
        ],
      };
      const { el, getValue } = renderSchema(schema, root);
      const sel = el.querySelector("select");
      sel.value = "1";
      sel.dispatchEvent(new Event("change"));
      const inputs = el.querySelectorAll("input");
      inputs[0].value = "7";
      const v = getValue();
      assert(v && v.id === 7, "oneOf variant", v);
    });

    runCase("schema editor add/remove", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getSchema } = renderSchemaEditor({ type: "object", properties: { a: { type: "string" } } }, root);
      const addBtns = el.querySelectorAll("button");
      const addBtn = Array.from(addBtns).find(b => b.textContent.includes("Add property"));
      if (!addBtn) {
        assert(false, "schema editor: addBtn not found", Array.from(addBtns).map(b => b.textContent));
        return;
      }
      addBtn.click();
      const s = getSchema();
      assert(Object.keys(s.properties).length === 2, "schema editor added property", Object.keys(s.properties));
    });

    runCase("schema editor rename", () => {
      const root = document.createElement("div");
      document.body.appendChild(root);
      const { el, getSchema } = renderSchemaEditor({ type: "object", properties: { foo: { type: "string" } } }, root);
      const nameInp = el.querySelector("input");
      nameInp.value = "bar";
      nameInp.dispatchEvent(new Event("change"));
      const s = getSchema();
      assert("bar" in s.properties, "schema editor renamed property", Object.keys(s.properties));
    });

    document.getElementById("results").textContent = JSON.stringify(results, null, 2);
    window.__testResults = results;
    window.__testDone = true;
  </script>
</body>
</html>

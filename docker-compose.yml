volumes:
  tailscale-data:
    driver: local
  certbot-www:
    driver: local
  certbot-logs:
    driver: local

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cert:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
      # Webコンテンツ (必要に応じて)
      - ./www:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  certbot:
    image: certbot/certbot:latest
    container_name: infrastructure-certbot
    volumes:
      - ./nginx/cert:/etc/letsencrypt
      - certbot-www:/var/www/certbot
      - certbot-logs:/var/log/letsencrypt
    # 証明書の自動更新 (12時間ごとにチェック)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # Tailscale - VPN
  tailscale:
    image: tailscale/tailscale:stable
    hostname: tailscale
    env_file:
      - ./tailscale/.env
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--accept-routes
    volumes:
      - tailscale-data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    restart: unless-stopped

  wireguard:
    image: linuxserver/wireguard:latest
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Asia/Tokyo"
      SERVERURL: syoch.f5.si
      SERVERPORT: 53
      PEERS: syocharch,openwrt  # Peer名 (それぞれ鍵が発行される)
    volumes:
      - ./wireguard:/config
      - /lib/modules:/lib/modules
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    ports:
      - "53:51820/udp"
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 30s
      timeout: 10s
      retries: 3

# Nginx configuration for Nix deployment
# This configuration requires root privileges for ports 80/443

# Process settings
pid nginx/logs/nginx.pid;
error_log nginx/logs/error.log;

# Worker processes
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # MIME types - use types block instead of include
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        application/javascript                js;
        application/json                      json;
        image/png                             png;
        image/svg+xml                         svg svgz;
        image/webp                            webp;
        font/woff                             woff;
        font/woff2                            woff2;
        application/pdf                       pdf;
        application/zip                       zip;
        text/plain                            txt;
    }
    default_type application/octet-stream;

    # Logging
    access_log nginx/logs/access.log;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1G;

    # Temporary paths
    client_body_temp_path nginx/tmp/client_body;
    proxy_temp_path nginx/tmp/proxy;
    fastcgi_temp_path nginx/tmp/fastcgi;
    uwsgi_temp_path nginx/tmp/uwsgi;
    scgi_temp_path nginx/tmp/scgi;

    upstream backend {
        server localhost:8001;
    }

    # HTTP server - redirect to HTTPS and handle certbot challenges
    server {
        # Port 80 for standard HTTP (requires root)
        listen 80 default_server;
        server_name syoch.f5.si;

        # Let's Encrypt challenge location
        location /.well-known/acme-challenge/ {
            # Relative path works for both Nix and Docker
            root certbot/www;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        # Port 443 for standard HTTPS (requires root)
        listen 443 ssl default_server;
        server_name syoch.f5.si;

        # SSL certificate paths (relative path works for both)
        ssl_certificate ../certbot/conf/live/syoch.f5.si/fullchain.pem;
        ssl_certificate_key ../certbot/conf/live/syoch.f5.si/privkey.pem;

        # SSL configuration (modern security settings)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}

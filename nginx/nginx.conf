events {}

http {
    client_max_body_size 1G;

    upstream backend {
        server host-gateway:8001;
    }

    # HTTP server - redirect to HTTPS and handle certbot challenges
    server {
        listen 80;
        server_name syoch.f5.si;

        # Let's Encrypt challenge location
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name syoch.f5.si;

        # SSL certificate paths
        ssl_certificate /etc/letsencrypt/live/syoch.f5.si/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/syoch.f5.si/privkey.pem;

        # SSL configuration (modern security settings)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }
}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure - Docker Compose</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .status {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            margin: 1rem 0;
            font-weight: 600;
        }
        
        .info {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .label {
            font-weight: 600;
            color: #4b5563;
        }
        
        .value {
            color: #667eea;
            font-family: 'Courier New', monospace;
        }
        
        .footer {
            margin-top: 2rem;
            color: #9ca3af;
            font-size: 0.9rem;
        }
        
        .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>Infrastructure Ready</h1>
        <p class="subtitle">Docker Compose で管理されています</p>
        
        <div class="status">✓ All Systems Operational</div>
        
        <div class="info">
            <div class="info-item">
                <span class="label">Webサーバー</span>
                <span class="value">Nginx</span>
            </div>
            <div class="info-item">
                <span class="label">SSL証明書</span>
                <span class="value">Let's Encrypt</span>
            </div>
            <div class="info-item">
                <span class="label">VPN</span>
                <span class="value">Tailscale / WireGuard</span>
            </div>
            <div class="info-item">
                <span class="label">オーケストレーション</span>
                <span class="value">Docker Compose</span>
            </div>
        </div>
        
        <div class="footer">
            <p>Powered by Docker Compose</p>
            <p>管理スクリプト: <code>./docker-manage.sh</code></p>
        </div>
    </div>
</body>
</html>
